minimumReleaseAge: 4320 # 3 days in minutes
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080
verifyDepsBeforeRun: prompt

packages:
  - apps/*
  - packages/*

catalog:
  '@types/node24': npm:@types/node@24.13.2
  electron: 43.1.0
  oxfmt: 0.58.0
  oxlint: 1.73.0
  oxlint-tsgolint: 0.24.0
  tsdown: 0.22.5

savePrefix: ''

allowBuilds:
  lefthook: true
  nx: true

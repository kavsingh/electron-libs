minimumReleaseAge: 4320 # 3 days in minutes
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080
verifyDepsBeforeRun: prompt

packages:
  - apps/*
  - packages/*

catalog:
  '@types/node24': npm:@types/node@24.13.2
  electron: 42.5.0
  oxfmt: 0.56.0
  oxlint: 1.71.0
  oxlint-tsgolint: 0.23.0
  tsdown: 0.22.3

savePrefix: ''

allowBuilds:
  lefthook: true
  nx: true
